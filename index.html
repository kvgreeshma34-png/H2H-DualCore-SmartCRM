<!DOCTYPE html>
<html>
<head>
    <title>SmartCMR</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { margin: 5px; padding: 8px 15px; cursor: pointer; }
        .customer { border: 1px solid #ddd; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>SmartCMR - Customer Portal</h1>
    
    <h2>Add Customer</h2>
    <input type="text" id="name" placeholder="Name">
    <input type="text" id="phone" placeholder="Phone">
    <button onclick="addCustomer()">Add</button>
    
    <h2>Customers</h2>
    <div id="list"></div>
    
    <h2>AI Insights</h2>
    <div id="insights"></div>

    <script>
        let customers = JSON.parse(localStorage.getItem('customers') || '[]');
        
        function save() {
            localStorage.setItem('customers', JSON.stringify(customers));
            display();
            insights();
        }
        
        function addCustomer() {
            let name = document.getElementById('name').value;
            let phone = document.getElementById('phone').value;
            if(name && phone) {
                customers.push({ name, phone, lastContact: new Date().toISOString() });
                save();
                document.getElementById('name').value = '';
                document.getElementById('phone').value = '';
            }
        }
        
        function display() {
            let html = '';
            customers.forEach((c, i) => {
                html += `<div class="customer">
                    <strong>${c.name}</strong> - ${c.phone}<br>
                    Last contact: ${new Date(c.lastContact).toLocaleDateString()}
                    <button onclick="markContacted(${i})">Mark Contacted</button>
                    <button onclick="deleteCustomer(${i})">Delete</button>
                </div>`;
            });
            document.getElementById('list').innerHTML = html || 'No customers';
        }
        
        function markContacted(i) {
            customers[i].lastContact = new Date().toISOString();
            save();
        }
        
        function deleteCustomer(i) {
            customers.splice(i, 1);
            save();
        }
        
        function insights() {
            let now = new Date();
            let needFollowup = customers.filter(c => {
                let days = (now - new Date(c.lastContact)) / (86400000);
                return days > 7;
            });
            
            let html = `<p>Total customers: ${customers.length}</p>`;
            if(needFollowup.length > 0) {
                html += `<p>⚠️ AI Insight: ${needFollowup.length} customers need follow-up (not contacted in 7+ days)</p>`;
            } else {
                html += `<p>✅ All customers are up to date</p>`;
            }
            html += `<p>💡 Offline mode active - Data saved locally</p>`;
            document.getElementById('insights').innerHTML = html;
        }
        
        display();
        insights();
    </script>
</body>
</html>
