<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCRM - AI Customer Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body.light-mode {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
        }

        body.dark-mode .card {
            background: #1e1e2e;
            color: #eee;
        }

        body.dark-mode .customer-item {
            background: #2a2a3e;
            color: #eee;
            border-color: #444;
        }

        body.dark-mode .insight-item {
            background: #2a2a3e;
            color: #eee;
        }

        body.dark-mode input,
        body.dark-mode select,
        body.dark-mode textarea {
            background: #2a2a3e;
            color: #eee;
            border-color: #444;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        body.dark-mode .header {
            background: #1e1e2e;
        }

        .header h1 {
            color: #667eea;
        }

        .dark-mode-toggle {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }

        .offline-badge {
            background: #4CAF50;
            color: white;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .ai-card {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-left: 5px solid #764ba2;
        }.stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #667eea;
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        body.dark-mode .stat-card {
            background: #0f3460;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
        }

        .chart-container {
            max-width: 100%;
            margin: 20px 0;
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
        }

        body.dark-mode .chart-container {
            background: #1a1a2e;
        }

        canvas {
            max-height: 300px;
            width: 100%;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }

        button {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }

        .btn-danger {
            background: #f44336;
        }

        .btn-success {
            background: #4CAF50;
        }

        .btn-excel {
            background: #28a745;
        }

        .customer-item {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .priority-critical {
            background: #f44336;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .priority-high {
            background: #ff9800;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .priority-normal {
            background: #4CAF50;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .insight-item {
            background: white;
            padding: 15px;
            margin: 12px 0;
            border-radius: 10px;
            border-left: 4px solid #764ba2;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .header {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="light-mode">
    <div class="container"><div class="header">
        <h1>📋 SmartCRM</h1>
        <div>
            <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
            <div class="offline-badge" style="margin-left: 10px;">📡 Offline Mode | AI Active</div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-number" id="totalCustomers">0</div><div>Total</div></div>
        <div class="stat-card"><div class="stat-number" id="criticalCount">0</div><div>Critical</div></div>
        <div class="stat-card"><div class="stat-number" id="needFollowup">0</div><div>Need Follow-up</div></div>
        <div class="stat-card"><div class="stat-number" id="healthScore">100%</div><div>Health Score</div></div>
    </div>

    <div class="card ai-card">
        <h2>🤖 AI-Driven Insights</h2>
        <div id="aiInsights">Loading...</div>
    </div>

    <div class="card">
        <h2>📊 Customer Health Trends</h2>
        <div class="chart-container">
            <canvas id="healthChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h2>➕ Add New Customer</h2>
        <input type="text" id="customerName" placeholder="Full Name *">
        <input type="text" id="customerPhone" placeholder="Phone Number *">
        <input type="text" id="customerAddress" placeholder="Address">
        <select id="customerPriority">
            <option value="normal">Normal Priority</option>
            <option value="high">⚠️ High Priority</option>
            <option value="critical">🚨 Critical</option>
        </select>
        <textarea id="customerNotes" placeholder="Notes" rows="2"></textarea>
        <button onclick="addCustomer()" class="btn-success">💾 Save Customer</button>
    </div>

    <div class="card">
        <h2>👥 Customer Database</h2>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Search..." onkeyup="searchCustomers()">
        </div>
        <div id="customerList"></div>
        <div class="action-buttons">
            <button onclick="exportToExcel()" class="btn-excel">📊 Export to Excel</button>
            <button onclick="exportData()" style="background:#2196F3;">📁 Export to JSON</button>
            <button onclick="clearAllData()" class="btn-danger">🗑️ Clear All</button>
        </div>
    </div>
</div><script>
    let customers = [];
    let healthChart = null;

    function loadData() {
        const saved = localStorage.getItem('smartcrm_customers');
        if (saved) {
            customers = JSON.parse(saved);
        } else {
            customers = [
                {id: 1, name: "Ahmad Rezaei", phone: "0912 345 6789", address: "Tehran", priority: "critical", notes: "Needs medication", lastContact: new Date(Date.now() - 10*86400000).toISOString()},
                {id: 2, name: "Sarah Mohammadi", phone: "0935 123 4567", address: "Tehran", priority: "high", notes: "Pregnant", lastContact: new Date(Date.now() - 3*86400000).toISOString()},
                {id: 3, name: "Mohammed Karimi", phone: "0910 987 6543", address: "Tehran", priority: "normal", notes: "Regular customer", lastContact: new Date(Date.now() - 1*86400000).toISOString()}
            ];
            saveData();
        }
        displayCustomers();
        generateAI();
        updateStats();
        updateChart();
    }

    function saveData() {
        localStorage.setItem('smartcrm_customers', JSON.stringify(customers));
        updateStats();
        updateChart();
    }

    function addCustomer() {
        let name = document.getElementById('customerName').value.trim();
        let phone = document.getElementById('customerPhone').value.trim();
        if (!name || !phone) { alert("Enter name and phone"); return; }
        
        customers.unshift({
            id: Date.now(),
            name: name,
            phone: phone,
            address: document.getElementById('customerAddress').value || "Not provided",
            priority: document.getElementById('customerPriority').value,
            notes: document.getElementById('customerNotes').value || "",
            lastContact: new Date().toISOString()
        });
        saveData();
        displayCustomers();
        generateAI();
        
        document.getElementById('customerName').value = "";
        document.getElementById('customerPhone').value = "";
        document.getElementById('customerAddress').value = "";
        document.getElementById('customerPriority').value = "normal";
        document.getElementById('customerNotes').value = "";
        alert("Customer added!");
    }

    function deleteCustomer(id) {
        if (confirm("Delete?")) {
            customers = customers.filter(c => c.id !== id);
            saveData();
            displayCustomers();
            generateAI();
        }
    }function markContacted(id) {
    let c = customers.find(c => c.id === id);
    if (c) {
        c.lastContact = new Date().toISOString();
        saveData();
        displayCustomers();
        generateAI();
        alert("Contact recorded!");
    }
}

function searchCustomers() {
    let term = document.getElementById('searchInput').value.toLowerCase();
    let filtered = customers.filter(c => c.name.toLowerCase().includes(term) || c.phone.includes(term));
    displayCustomers(filtered);
}

function calculateHealthScore(customer) {
    let days = (new Date() - new Date(customer.lastContact)) / 86400000;
    let score = 100;
    if (days > 7) score -= 30;
    else if (days > 3) score -= 15;
    if (customer.priority === 'critical') score -= 10;
    else if (customer.priority === 'high') score -= 5;
    return Math.max(0, score);
}

function displayCustomers(list = null) {
    let data = list || customers;
    let container = document.getElementById('customerList');
    if (data.length === 0) {
        container.innerHTML = "<div style='padding:40px;text-align:center'>No customers</div>";
        return;
    }
    container.innerHTML = data.map(c => {
        let days = Math.floor((new Date() - new Date(c.lastContact)) / 86400000);
        let pClass = c.priority === 'critical' ? 'priority-critical' : (c.priority === 'high' ? 'priority-high' : 'priority-normal');
        let pText = c.priority === 'critical' ? '🚨 CRITICAL' : (c.priority === 'high' ? '⚠️ HIGH' : '✅ NORMAL');
        let health = calculateHealthScore(c);
        return `
            <div class="customer-item">
                <div style="display:flex;justify-content:space-between;flex-wrap:wrap;">
                    <strong>${escapeHtml(c.name)}</strong>
                    <div>
                        <span class="${pClass}">${pText}</span>
                        <span style="margin-left:10px;background:#667eea;color:white;padding:2px 8px;border-radius:12px;">Health: ${health}%</span>
                    </div>
                </div>
                📞 ${escapeHtml(c.phone)}<br>
                📍 ${escapeHtml(c.address)}<br>
                🕒 ${days} days ago
                ${c.notes ? `<br>📝 ${escapeHtml(c.notes)}` : ""}
                <div style="margin-top:10px">
                    <button onclick="markContacted(${c.id})" style="background:#4CAF50">✅ Mark Contacted</button>
                    <button onclick="deleteCustomer(${c.id})" class="btn-danger">🗑️ Delete</button>
                </div>
            </div>
        `;
    }).join("");
}function generateAI() {
    let now = new Date();
    let needFollow = customers.filter(c => (now - new Date(c.lastContact)) / 86400000 > 7).length;
    let critical = customers.filter(c => c.priority === 'critical').length;
    let urgent = customers.filter(c => c.priority === 'critical' && (now - new Date(c.lastContact)) / 86400000 > 7).length;
    let avgHealth = customers.length ? customers.reduce((s, c) => s + calculateHealthScore(c), 0) / customers.length : 100;
    
    let html = `<div class="insight-item">📊 Overall Health Score: ${Math.floor(avgHealth)}%</div>`;
    if (urgent > 0) html += `<div class="insight-item" style="border-left-color:#f44336">🚨 URGENT: ${urgent} critical customer(s) overdue!</div>`;
    if (needFollow > 0) html += `<div class="insight-item" style="border-left-color:#ff9800">⚠️ ${needFollow} customer(s) need follow-up</div>`;
    if (critical > 0) html += `<div class="insight-item">🚨 ${critical} critical priority customer(s)</div>`;
    html += `<div class="insight-item">💡 ${urgent > 0 ? "Contact critical customers NOW" : (needFollow > 0 ? "Start follow-up calls today" : "All caught up! Great job!")}</div>`;
    html += `<div class="insight-item">📡 Offline mode - Data saved locally</div>`;
    document.getElementById('aiInsights').innerHTML = html;
}

function updateStats() {
    let now = new Date();
    document.getElementById('totalCustomers').innerText = customers.length;
    document.getElementById('criticalCount').innerText = customers.filter(c => c.priority === 'critical').length;
    document.getElementById('needFollowup').innerText = customers.filter(c => (now - new Date(c.lastContact)) / 86400000 > 7).length;
    let avg = customers.length ? customers.reduce((s, c) => s + calculateHealthScore(c), 0) / customers.length : 100;
    document.getElementById('healthScore').innerText = Math.floor(avg) + "%";
}

function updateChart() {
    const ctx = document.getElementById('healthChart').getContext('2d');
    const priorities = ['Critical', 'High', 'Normal'];
    const counts = [
        customers.filter(c => c.priority === 'critical').length,
        customers.filter(c => c.priority === 'high').length,
        customers.filter(c => c.priority === 'normal').length
    ];
    
    if (healthChart) healthChart.destroy();
    
    healthChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: priorities,
            datasets: [{
                label: 'Number of Customers',
                data: counts,
                backgroundColor: ['#f44336', '#ff9800', '#4CAF50'],
                borderRadius: 10
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'top' },
                title: { display: true, text: 'Customers by Priority Level' }
            }
        }
    });
}function exportToExcel() {
            let csv = "Name,Phone,Address,Priority,Last Contact,Health Score\n";
            customers.forEach(c => {
                let days = Math.floor((new Date() - new Date(c.lastContact)) / 86400000);
                csv += `"${c.name}","${c.phone}","${c.address}","${c.priority}","${days} days ago",${calculateHealthScore(c)}\n`;
            });
            
            let blob = new Blob([csv], { type: 'text/csv' });
            let url = URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.href = url;
            a.download = `customers_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            alert("Excel file downloaded!");
        }

        function exportData() {
            let dataStr = JSON.stringify(customers, null, 2);
            let blob = new Blob([dataStr], { type: 'application/json' });
            let url = URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.href = url;
            a.download = `customers_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            alert("Data exported!");
        }

        function clearAllData() {
            if (confirm("Delete ALL data?")) {
                localStorage.removeItem('smartcrm_customers');
                customers = [];
                saveData();
                displayCustomers();
                generateAI();
            }
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            document.body.classList.toggle('light-mode');
            let btn = document.querySelector('.dark-mode-toggle');
            if (document.body.classList.contains('dark-mode')) {
                btn.innerHTML = '☀️ Light Mode';
            } else {
                btn.innerHTML = '🌙 Dark Mode';
            }
        }

        function escapeHtml(text) {
            let div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadData();
    </script>
</body>
</html>
